<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>trần quốc trung</p>
    <!-- line-height: 3 nhân lên 3 lần so với font chữ cha -->
    <p style="line-height: 3;" >trần quốc trung</p>

    <!-- ví dụ phần tử gốc là 10px -->
    <p style="font-size: 10px; line-height: 3;" >trần quốc trung</p>
    <!-- ghi rõ ràng hơn -->
    <p style="font-size: 10px; line-height: 3em;" >trần quốc trung</p>

    <!-- hoặc có thể dùng % cỡ chữ nhân cho số phần trăm-->
    <p style="font-size: 10px; line-height: 300%;" >trần quốc trung</p>

    <div style="font-size: 40px;">
        <!-- lấy ở cỡ chữ mặt định trong phần tử p chứ không kế thừa từ phần tử cha là div -->
        <p style="font-size: 10px; line-height: 300%;" >trần quốc trung</p>
    </div>
</body>
</html>
