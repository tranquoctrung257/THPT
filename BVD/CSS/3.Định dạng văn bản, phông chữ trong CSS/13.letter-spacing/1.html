<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- letter-spacing khoảng cách giữa các chữ cái trong văn bản -->
    <p style="letter-spacing: 2px;">Trần quốc trung</p>
    <!-- hoặc có thể dùng số âm cho các font chữ cách xa nhau -->
    <p style="letter-spacing: -2px;">Trần quốc trung</p>
</body>
</html>
