<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- thuộc tính này có 2 giá trị độ dài đổ bóng theo phương ngang và độ dài đổ bóng theo phương dọc. -->
    <p style="text-shadow: 4px 4px;">trần quốc trung</p>

    <!-- độ dài độ bóng phương ngang độ dài đổ bóng phương dọc bán kính làm mờ màu -->
    <p style="text-shadow: 4px 4px 3px gray;">trần quốc trung</p>

    <!-- nó cũng có thể nhận giá trị âm  -->
    <p style="text-shadow: -4px -4px 3px gray;">trần quốc trung</p>

</body>
</html>
