<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <!-- thuộc tính padding dùng để thiết lập vùng đệm tức là khoảng cách giữa vùng nội dung với vùng khung viền  -->
     <div>
        <div style="width: 400px; padding: 20px;">
            trần quốc trung
        </div>
     </div>
     <!-- 20% của phần tử nội dung của phần tử div bên ngoài -->
     <div>
        <div style="width: 400px; padding: 20%;">
            trần quốc trung
        </div>
     </div>
</body>
</html>
