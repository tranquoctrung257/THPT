<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- nhận giá trị từ 0 đến 100 giá trị càng cao càng đậm -->
    <p style="font-weight: 0;">trần quốc trung</p>
    <p style="font-weight: 100;">trần quốc trung</p>
    <p style="font-weight: 500;">trần quốc trung</p>
    <p style="font-weight: 1000;">trần quốc trung</p>

    <!-- hoặc có thể sử dụng normal mặc định hoặc bold in đậm -->
    <p style="font-weight: normal;">trần quốc trung</p>
    <p style="font-weight: bold;">trần quốc trung</p>
</body>
</html>
