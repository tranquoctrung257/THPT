<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- các thuộc tính
    controls bảng điều khiển
    autoplay tự động phát không được hỗ trợ bởi chrome edge
    muted tự động tắt âm thanh
     -->
    <audio src="nhac.mp3" controls ></audio>

    <hr>

    <!-- có thể đưa nhiều dạng tệp âm thanh vào trong 1 thẻ audio  -->
    <audio controls>
        <source src="nhac.mp3" type="audio/mp3">
        <source src="nhac.wav" type="audio/wav">
    </audio>
</body>
</html>
