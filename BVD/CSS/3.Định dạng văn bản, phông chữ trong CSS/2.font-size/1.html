<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p style="font-size: 1cm;" >trần quốc trung</p>
    <p style="font-size: 10mm;">trần quốc trung</p>
    <p style="font-size: 1in;">trần quốc trung</p>
    <!-- 1in = 2,5cm -->
    <p style="font-size: 1px;">trần quốc trung</p>
    <!-- 1px bằng 1 bóng đèn trên màn hình -->
    <!-- trình duyệt mặc định sẽ có cỡ chữ là 16px -->
    <!-- Các đơn vị đo tương đối -->
     <!-- 1em là cỡ chữ của phần tử hiện tại -->
    <p style="font-size: 2em;">trần quốc trung</p>
    <!-- rem cỡ chữ của phần tử gốc html chính là thẻ html  -->
    <!-- có thể thay thế cỡ chữ mặc định của rem ở trong phần tử html -->
    <p style="font-size: 1rem;">trần quốc trung</p>
    <!-- lấy kích cỡ của phần tử cha -->
    <p style="font-size: 200%;">trần quốc trung</p>
    <p style="font-size: xx-small;">trần quốc trung</p>
    <p style="font-size: x-small;">trần quốc trung</p>
    <!-- medium cỡ chữ mặc định nếu đổi phần tử gốc thì nó vẫn như vậy chứ không đổi -->
    <p style="font-size: small;">trần quốc trung</p> 
    <p style="font-size: larger;">trần quốc trung</p>
    <p style="font-size: x-large;">trần quốc trung</p>
    <p style="font-size: xx-large;">trần quốc trung</p>
</body>
</html>
