<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focus</title>
    <style>
        /* định dạng phần tử ở trạng thái định dạng tập trung. một số người thay vì dùng chuột thì sẽ dùng bàn phím và dùng phím tab và enter thì đây sẽ áp dụng được  */
        a:focus{
            outline: 10px dotted red;
        }
    </style>
</head>
<body>
    <a href="#id1">đến hình số 1</a>
    <hr>


    <img src="https://i.pinimg.com/webp85/1200x/32/e0/3b/32e03ba552bb9d5b276b93757830c8e0.webp" alt="1">
    <p id="id1">Ảnh nền điện thoại</p>
</body>
</html>
