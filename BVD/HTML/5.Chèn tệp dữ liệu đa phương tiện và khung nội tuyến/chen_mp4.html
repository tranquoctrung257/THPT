<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- các thuộc tính
    controls bảng điều khiển
    autoplay tự động phát nhưng phải đi vs thẻ muted trình duyệt mới tự động phát
    muted tự động tắt âm thanh
    poster="hình ảnh lúc đầu khi chưa nhấn vào video"
     -->
    <video 
    src="Borderless.mp4" 
    controls 
    poster="youtube_audio_library_44c99d99de.webp" 
    width="500">
    </video>

    <hr>

    <video controls>
        <source src="Borderless.mp4" type="video/mp4">
        <source src="Borderless.ts" type="video/ts">
    </video>
</body>
</html>
