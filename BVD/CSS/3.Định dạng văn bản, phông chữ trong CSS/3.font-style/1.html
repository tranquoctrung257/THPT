<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- kiểu chữ mặc đinh -->
    <p style="font-style: normal;">trần quốc trung</p> 

    <!-- kiểu chữ nghiêng -->
    <p style="font-style: italic;">trần quốc trung</p> 

    <!-- kiểu chữ in nghiêng oblique trình duyệt sài chữ thẳng rồi in nghiêng chữ đó còn italic là trình duyệt lấy 1 phông chữ in nghiêng -->
    <p style="font-style: oblique;" >trần quốc trung</p>


</body>
</html>
