<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- lowercase: in thường tất cả  -->
    <!-- uppercase in hoa tất cả  -->
    <!-- capitalize in hoa các chữ cái đầu tiên  -->
    <p style="text-transform: lowercase;">trần quốc trung</p>
    <p style="text-transform: uppercase;">trần quốc trung</p>
    <p style="text-transform: capitalize;">trần quốc trung</p>
</body>
</html>
