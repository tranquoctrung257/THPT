<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {border: 1px solid red;}
    </style>
</head>
<body>
    <div style="font-size: 20px; ">
        <!-- baseline đặt chữ toi trên đường cơ sở của văn bản  -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: baseline;">toi</span> </p>
        <!-- top trùng với đường phía trên  -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: top;">toi</span> </p>
        
        <!-- middle giữa  -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: middle;">toi</span> </p>
        
        <!-- bottom hạ xuống dưới -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: bottom;">toi</span> </p>
        
        <!-- super lên trên nhưng cách dòng cơ sở 1 khoảng -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: super;">toi</span> </p>
        <!-- sub ở vị trí của chỉ số dưới -->
        <p>chúc thành công <span style="font-size: 10px; vertical-align: sub;">toi</span> </p>



    </div>
</body>
</html>
