<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- text-decoration nhận giá trị none không có gì cả , underline gạch chân, line-through gạch ngang giữa chữ overline gạch phía trên chữ-->
    <p style="text-decoration: underline;">trần quốc trung</p>
    <p style="text-decoration: line-through;">trần quốc trung</p>
    <p style="text-decoration: overline;">trần quốc trung</p>
</body>
</html>
